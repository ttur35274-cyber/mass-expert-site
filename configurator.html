<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конфигуратор Mass-EXPERT — Быстрый подбор расходомера</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {
  --cfg-primary: #0B3D6B;
  --cfg-accent: #F59E0B;
  --cfg-gray: #6B7280;
}
body { font-family: 'Inter', sans-serif; background: #F8F9FA; padding-bottom: 4rem; }
.cfg-header { background: var(--cfg-primary); color: white; padding: 3rem 0 2rem; text-align: center; }
.cfg-header h1 { margin: 0; font-size: 1.75rem; }
.cfg-header p { color: rgba(255,255,255,0.7); margin: 0.5rem 0 0; font-size: 0.9375rem; }
.cfg-container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

.cfg-diagram { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.5rem 1rem; margin: 2rem auto; overflow-x: auto; text-align: center; }
.cfg-scheme { display: inline-flex; align-items: center; gap: 0; font-family: 'Courier New', monospace; font-size: 0.68rem; white-space: nowrap; }
.cfg-scheme-label { font-weight: 800; color: var(--cfg-primary); background: #EFF6FF; padding: 0.4rem 0.6rem; border-radius: 6px 0 0 6px; border: 2px solid var(--cfg-primary); border-right: none; font-size: 0.65rem; }
.cfg-block { display: inline-flex; flex-direction: column; align-items: center; padding: 0.3rem 0.35rem; border: 2px solid #D1D5DB; border-left: none; cursor: pointer; transition: all 0.15s; min-width: 44px; background: white; position: relative; }
.cfg-block:first-of-type { border-left: 2px solid #D1D5DB; }
.cfg-block:hover { border-color: var(--cfg-accent); background: #FFFBEB; z-index: 1; }
.cfg-block.selected { border-color: var(--cfg-accent); background: #FEF3C7; z-index: 2; }
.cfg-block .block-code { font-weight: 700; font-size: 0.6rem; color: var(--cfg-gray); }
.cfg-block .block-val { font-weight: 700; font-size: 0.65rem; color: var(--cfg-primary); margin-top: 1px; }
.cfg-block.selected .block-val { color: #92400E; }

.cfg-panel { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; display: none; }
.cfg-panel.active { display: block; }
.cfg-panel h3 { margin: 0 0 0.25rem; font-size: 1.125rem; color: var(--cfg-primary); }
.cfg-panel .panel-desc { font-size: 0.8125rem; color: var(--cfg-gray); margin-bottom: 1rem; }
.cfg-panel .panel-note { font-size: 0.75rem; color: #B91C1C; background: #FEF2F2; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.75rem; display: none; }
.cfg-panel .panel-note.show { display: block; }
.cfg-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.5rem; }
.cfg-option { border: 1px solid #E5E7EB; border-radius: 8px; padding: 0.5rem 0.75rem; cursor: pointer; transition: all 0.15s; font-size: 0.8125rem; }
.cfg-option:hover { border-color: var(--cfg-accent); background: #FFFBEB; }
.cfg-option.selected { border-color: var(--cfg-accent); background: #FEF3C7; font-weight: 600; }
.cfg-option .opt-code { font-weight: 700; color: var(--cfg-primary); }
.cfg-option .opt-desc { color: var(--cfg-gray); font-size: 0.75rem; margin-top: 2px; }
.cfg-option .opt-note { color: #B91C1C; font-size: 0.7rem; font-style: italic; }

.cfg-summary { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.cfg-summary h3 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--cfg-primary); }
.cfg-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.4rem; }
.cfg-summary-item { font-size: 0.7rem; padding: 0.3rem 0.5rem; background: #F3F4F6; border-radius: 6px; }
.cfg-summary-item .s-block { font-weight: 700; color: var(--cfg-primary); }
.cfg-summary-item .s-code { font-weight: 700; color: #92400E; }

.cfg-form { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.5rem; }
.cfg-form h3 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--cfg-primary); }
.cfg-form input, .cfg-form textarea { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #D1D5DB; border-radius: 8px; font-family: inherit; font-size: 0.875rem; margin-bottom: 0.75rem; box-sizing: border-box; }
.cfg-form input:focus, .cfg-form textarea:focus { outline: none; border-color: var(--cfg-accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
.cfg-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.cfg-form .btn-primary { font-size: 1rem; padding: 0.75rem 2rem; }
.cfg-success { display: none; text-align: center; padding: 3rem 2rem; background: white; border: 1px solid #E5E7EB; border-radius: 12px; }
.cfg-success.show { display: block; }
.cfg-success .icon { font-size: 3rem; color: #10B981; margin-bottom: 1rem; }
@media (max-width: 600px) { .cfg-form .form-row { grid-template-columns: 1fr; } }
</style>
</head>

<div class="cfg-header">

    <p>Выберите опции по порядку — система подскажет доступные варианты</p>

    <div class="cfg-summary-grid" id="summaryGrid"></div>
  </div>
  <div class="cfg-form" id="orderForm">
    <h3><i class="fas fa-paper-plane"></i> Отправить запрос</h3>
    <div class="form-row">
      <input type="text" id="orderName" placeholder="Ваше имя *" required>
      <input type="tel" id="orderPhone" placeholder="Телефон *" required>
    </div>
    <input type="email" id="orderEmail" placeholder="E-mail">
    <textarea id="orderComment" rows="3" placeholder="Дополнительные требования, количество, сроки..."></textarea>
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">

      <span style="font-size:0.8125rem;color:var(--cfg-gray);">* — обязательные поля</span>

  </div>

    <h3>Запрос отправлен!</h3>

    <button class="btn btn-outline" onclick="resetConfig()" style="margin-top:1rem;">Настроить ещё</button>
  </div>
</div>

    {c:'0',d:'Нет',n:'по умолчанию'},{c:'1',d:'Фланцы углерод. ст. + крепёж'},{c:'2',d:'Фланцы нерж. ст. + крепёж'},{c:'X',d:'Прочие',n:'описание обязательно'}
  ]},
  {id:'22V',name:'ETO (на заказ)',desc:'Индивидуально', opts:[{c:'ETOZZZ',d:'Инженерное решение',n:'привязывается к серийному номеру'}]},
  {id:'23X',name:'Гарантия',desc:'12/24 мес', opts:[
    {c:'-',d:'Стандартная',n:'12 мес. (не более 18 с изготовления)'},{c:'EW',d:'Расширенная',n:'24 мес. (не более 36)'},{c:'SW',d:'Специальная',n:'особые условия'}
  ]}
];

// ===== ОГРАНИЧЕНИЯ =====
const CONSTRAINTS = [
  {from:'2B',val:'L', check:(sel)=>{const s=sel['3C'];return !s||s==='U'||s==='D'||s==='X';}, msg:'Криогенное L: только U/D сенсоры'},
  {from:'2B',val:'D', check:(sel)=>{const s=sel['8H'];return !s||s==='S';}, msg:'Сверхнизкие D: только раздельное исполнение (8H=S)'},
  {from:'2B',val:'G', check:(sel)=>{const s=sel['8H'];return !s||s==='S';}, msg:'Высокая темп. G: только раздельное исполнение (8H=S)'},
  {from:'2B',val:'C', check:(sel)=>{const s=sel['8H'];return !s||s==='S';}, msg:'Сверхвысокая C: только раздельное исполнение (8H=S)'},
  {from:'3C',val:'U', check:(sel)=>{const d=sel['1A'];return !d||parseInt(d)>=3;}, msg:'U-образный: только ≥DN03'},
  {from:'3C',val:'K', check:(sel)=>{const d=sel['1A'];return !d||(parseInt(d)>=2&&parseInt(d)<=25);}, msg:'K-тип: только DN02–DN25'},
  {from:'3C',val:'D', check:(sel)=>{const d=sel['1A'];return !d||d==='001'||d==='002'||d==='025';}, msg:'Δ-тип: только DN01, DN02, DN25'},
  {from:'8H',val:'J', check:(sel)=>{const k=sel['11K'];return !k||k==='N'||k==='A';}, msg:'Компактное J: без взрывозащиты'},
  {from:'8H',val:'D', check:(sel)=>{const k=sel['11K'];return !k||k==='N'||k==='A';}, msg:'DIN-рейка D: без взрывозащиты'},
];

let selections = {};
let activeBlock = null;

function buildScheme() {
  const el = document.getElementById('scheme');
  BLOCKS.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'cfg-block';
    if (i === 0) div.classList.add('first');
    div.dataset.idx = i;
    div.innerHTML = `<span class="block-code">${b.id}</span><span class="block-val" id="val-${b.id}">—</span>`;
    div.onclick = () => selectBlock(i);
    div.title = b.name + ': ' + b.desc;
    el.appendChild(div);
  });
}

function selectBlock(idx) {
  activeBlock = idx;
  const block = BLOCKS[idx];
  document.querySelectorAll('.cfg-block').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.cfg-block[data-idx="${idx}"]`).classList.add('selected');

  const panel = document.getElementById('panel');
  panel.className = 'cfg-panel active';

  let noteHtml = '';
  const noteDiv = document.createElement('div');
  noteDiv.className = 'panel-note';

  let html = `<h3>${block.id}: ${block.name}</h3><p class="panel-desc">${block.desc}</p><div class="cfg-options">`;
  block.opts.forEach(opt => {
    const sel = selections[block.id] === opt.c ? ' selected' : '';
    // Check constraints
    let disabled = false;
    let warn = '';
    CONSTRAINTS.forEach(c => {
      if (c.from === block.id && c.val === opt.c && selections['1A']) {
        if (!c.check(selections)) { disabled = true; warn = c.msg; }
      }
    });
    // Also check constraints WHERE THIS BLOCK IS DEPENDED ON
    CONSTRAINTS.forEach(c => {
      if (c.from !== block.id && selections[c.from] === c.val && opt.c === selections[block.id]) {
        // Check if current selection violates constraint
      }
    });
    const disAttr = disabled ? ' style="opacity:0.4;cursor:not-allowed;"' : '';
    const noteHtml = opt.n ? `<div class="opt-note">${opt.n}</div>` : '';
    html += `<div class="cfg-option${sel}"${disAttr} onclick="${disabled?'':`selectOption('${block.id}','${opt.c}','${opt.d}')`}">
      <div class="opt-code">${opt.c}</div><div class="opt-desc">${opt.d}</div>${noteHtml}
    </div>`;
  });
  html += `</div>`;
  panel.innerHTML = html;

  // Show dynamic constraints note
  showConstraintsNote(block.id);
}

function showConstraintsNote(blockId) {
  const note = document.getElementById('panel').querySelector('.panel-note') || document.createElement('div');
  // Check if any constraint applies to a BLOCK THAT WAS ALREADY SELECTED
  let msgs = [];
  CONSTRAINTS.forEach(c => {
    if (c.from === blockId && selections[c.from] === c.val) {
      // This block has a constraint that affects other blocks
      msgs.push(`⚠ ${c.msg}`);
    }
  });
  // Check if previously selected blocks constrain this block
  CONSTRAINTS.forEach(c => {
    if (c.from !== blockId && selections[c.from] === c.val && !c.check(selections)) {
      msgs.push(`⚠ ${c.msg}`);
    }
  });
  note.className = 'panel-note' + (msgs.length ? ' show' : '');
  note.innerHTML = msgs.join('<br>');
  const panel = document.getElementById('panel');
  if (!panel.querySelector('.panel-note')) {
    panel.insertBefore(note, panel.querySelector('.cfg-options'));
  }
}

function selectOption(blockId, code, desc) {
  selections[blockId] = code;
  document.getElementById(`val-${blockId}`).textContent = code;
  document.querySelectorAll('#panel .cfg-option').forEach(el => el.classList.remove('selected'));
  event.target.closest('.cfg-option').classList.add('selected');
  updateSummary();
  
  const idx = BLOCKS.findIndex(b => b.id === blockId);
  if (idx >= 0 && idx < BLOCKS.length - 1) {
    // Check if next block should be skipped or constrained
    setTimeout(() => selectBlock(idx + 1), 250);
  }
}

function updateSummary() {
  const grid = document.getElementById('summaryGrid');
  let html = '';
  let code = 'Mass-EXPERT';
  BLOCKS.forEach(b => {
    const val = selections[b.id] || '?';
    code += '-' + val;
    html += `<div class="cfg-summary-item"><span class="s-block">${b.id}</span> ${val === '?' ? '?' : `<span class="s-code">${val}</span>`}</div>`;
  });
  document.getElementById('cfgCode').textContent = code;
  grid.innerHTML = html;
}

function sendOrder() {
  const name = document.getElementById('orderName').value.trim();
  const phone = document.getElementById('orderPhone').value.trim();
  if (!name || !phone) { alert('Заполните имя и телефон'); return; }
  let configStr = 'Mass-EXPERT';
  BLOCKS.forEach(b => { configStr += '-' + (selections[b.id] || '?'); });
  const comment = document.getElementById('orderComment').value.trim();
  const email = document.getElementById('orderEmail').value.trim();
  // Build detailed config
  let details = '';
  BLOCKS.forEach(b => { const v = selections[b.id]; if (v) { const o = b.opts.find(x=>x.c===v); details += `\n  ${b.id} (${b.name}): ${v} — ${o ? o.d : ''}`; } });
  const msg = `🔧 НОВЫЙ ЗАПРОС КОНФИГУРАТОРА\n\nКонфигурация: ${configStr}\n${details}\n\nИмя: ${name}\nТелефон: ${phone}\nEmail: ${email || '—'}\nКомментарий: ${comment || '—'}`;
  document.getElementById('orderForm').style.display = 'none';
  document.getElementById('success').classList.add('show');
  navigator.clipboard.writeText(msg).catch(() => {});
  console.log('Order:', msg);
}

function resetConfig() {
  selections = {}; activeBlock = null;
  document.querySelectorAll('.cfg-block').forEach(el => el.classList.remove('selected'));
  BLOCKS.forEach(b => document.getElementById(`val-${b.id}`).textContent = '—');
  document.getElementById('panel').className = 'cfg-panel';
  document.getElementById('panel').innerHTML = '';
  document.getElementById('orderForm').style.display = 'block';
  document.getElementById('success').classList.remove('show');
  ['orderName','orderPhone','orderEmail','orderComment'].forEach(id => document.getElementById(id).value = '');
  updateSummary();
  selectBlock(0);
}

buildScheme();
updateSummary();
</script>
</body>
</html>
